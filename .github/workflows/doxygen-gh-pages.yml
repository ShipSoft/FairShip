name: Deploy Doxygen Docs
on:
  push:
    branches: [master]
  workflow_dispatch:
# Share the gh-pages deploy lock with the plot push jobs in pixi-build.yml so a
# docs deploy cannot race a plot push to the gh-pages branch.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false
jobs:
  deploy:
    name: Deploy docs
    uses: ShipSoft/.github/.github/workflows/doxygen-gh-pages.yml@main
    with:
      doxyfile: doxygen/Doxyfile
      preserve: plots
