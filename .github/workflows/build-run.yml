  static-analysis:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    needs: build
    container:
      image: registry.cern.ch/ship/gha-runner:latest
      volumes:
        - /cvmfs/ship.cern.ch:/cvmfs/ship.cern.ch
    env:
      version: 26.02
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: FairShip
          fetch-depth: 0
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact-${{ env.version }}
          path: sw/
      - name: Fix source symlinks
        run: |
          rm -rf sw/SOURCES/FairShip/master/0
          ln -s $GITHUB_WORKSPACE/FairShip sw/SOURCES/FairShip/master/0
      - name: Find changed files
        id: files
        run: |
          cd FairShip
          CHANGED=$(git diff --name-only --diff-filter=d ${{ github.event.pull_request.base.sha }} HEAD)
          CPP_FILES=$(echo "$CHANGED" | grep -E '\.(cxx|h|cpp|cc|hxx|hpp)$' | sed 's|^|./|' | tr '\n' ' ')
          PY_FILES=$(echo "$CHANGED" | grep -E '\.py$' | tr '\n' ' ')
          echo "cpp=$CPP_FILES" >> "$GITHUB_OUTPUT"
          echo "py=$PY_FILES" >> "$GITHUB_OUTPUT"
      - name: Install clang-tidy
        run: pip install clang-tidy
      - name: Run clang-tidy
        if: steps.files.outputs.cpp != ''
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          unset PYTHONHOME PYTHONPATH
          cd FairShip
          echo "${{ steps.files.outputs.cpp }}" | xargs -P $(nproc) clang-tidy -p $GITHUB_WORKSPACE/sw/BUILD/FairShip-latest/FairShip 2>&1 | python3 .github/scripts/annotate_build.py
      - name: Install pyrefly
        run: pip install pyrefly
      - name: Run pyrefly
        if: steps.files.outputs.py != ''
        run: |
          cd FairShip
          pyrefly check --output-format=github ${{ steps.files.outputs.py }}
  static-analysis-push:
    if: github.event_name == 'push'
    runs-on: self-hosted
    needs: build
    container:
      image: registry.cern.ch/ship/gha-runner:latest
      volumes:
        - /cvmfs/ship.cern.ch:/cvmfs/ship.cern.ch
    env:
      version: 26.02
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: FairShip
          fetch-depth: 1
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact-${{ env.version }}
          path: sw/
      - name: Fix source symlinks
        run: |
          rm -rf sw/SOURCES/FairShip/master/0
          ln -s $GITHUB_WORKSPACE/FairShip sw/SOURCES/FairShip/master/0
      - name: Find source files
        id: files
        run: |
          cd FairShip
          CPP_FILES=$(find . -not -path './cmake/*' \( -name '*.cxx' -o -name '*.h' -o -name '*.cpp' -o -name '*.cc' -o -name '*.hxx' -o -name '*.hpp' \) | tr '\n' ' ')
          echo "cpp=$CPP_FILES" >> "$GITHUB_OUTPUT"
      - name: Install clang-tidy
        run: pip install clang-tidy
      - name: Run clang-tidy
        if: steps.files.outputs.cpp != ''
        continue-on-error: true
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          unset PYTHONHOME PYTHONPATH
          cd FairShip
          echo "${{ steps.files.outputs.cpp }}" | xargs -P $(nproc) clang-tidy -p $GITHUB_WORKSPACE/sw/BUILD/FairShip-latest/FairShip 2>&1 | python3 .github/scripts/annotate_build.py
      - name: Install pyrefly
        run: pip install pyrefly
      - name: Run pyrefly
        continue-on-error: true
        run: |
          cd FairShip
          pyrefly check --output-format=github
  run-tracking-benchmark:
    runs-on: self-hosted
    needs: [generate-matrix, build]
    strategy:
      matrix:
        version: ${{ fromJson(needs.generate-matrix.outputs.matrix).version }}
    container:
      image: registry.cern.ch/ship/gha-runner:latest
      volumes:
        - /cvmfs/ship.cern.ch:/cvmfs/ship.cern.ch
    env:
      version: ${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: FairShip
          lfs: true
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact-${{ matrix.version }}
          path: sw/
      - name: Run tracking benchmark
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/macro/run_tracking_benchmark.py \
            -n 200 --seed 42 --tag ci-benchmark \
            --output-json tracking_metrics.json
      - name: Render plots
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python FairShip/.github/scripts/render_plots.py \
            tracking_benchmark_histos.root \
            --output-dir plots/tracking-benchmark/${{ matrix.version }} \
            --job tracking-benchmark --config "${{ matrix.version }}"
      - name: Upload tracking metrics
        uses: actions/upload-artifact@v7
        with:
          name: tracking-metrics-${{ matrix.version }}
          path: |
            tracking_metrics.json
            tracking_benchmark_histos.root
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-tracking-benchmark-${{ matrix.version }}
          path: plots/
  run-fixed-target:
    runs-on: self-hosted
    needs: [generate-matrix, build]
    strategy:
      matrix:
        version: ${{ fromJson(needs.generate-matrix.outputs.matrix).version }}
    container:
      image: registry.cern.ch/ship/gha-runner:latest
      volumes:
        - /cvmfs/ship.cern.ch:/cvmfs/ship.cern.ch
    env:
      version: ${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: FairShip
          lfs: true
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact-${{ matrix.version }}
          path: sw/
      - name: Run Fixed Target Simulation
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/macro/run_fixedTarget.py -n 10 -e 10.0 -r 1
      - name: Render plots
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python FairShip/.github/scripts/render_plots.py \
            $GITHUB_WORKSPACE/*_run_fixedTarget_1/*.root \
            --output-dir plots/fixed-target/${{ matrix.version }} \
            --job fixed-target --config "${{ matrix.version }}"
      - name: Upload .root artifacts
        uses: actions/upload-artifact@v7
        with:
          name: root-files-fixed-target-${{ matrix.version }}
          path: |
            /__w/FairShip/FairShip/*_run_fixedTarget_1/*.root
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-fixed-target-${{ matrix.version }}
          path: plots/
  deploy-plots:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [run-tracking-benchmark, run-sim-chain, run-fixed-target]
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Download all plot artefacts
        uses: actions/download-artifact@v8
        with:
          pattern: plots-*
          path: all-plots/
          merge-multiple: true
      - name: Generate index page
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TITLE="CI Plots for PR #${{ github.event.pull_request.number }}"
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plots/pr/${{ github.event.pull_request.number }}/${{ github.run_id }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            TITLE="CI Plots for $SHORT_SHA"
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plots/master/${{ github.run_id }}-$SHORT_SHA"
          fi
          python3 .github/scripts/generate_plot_index.py all-plots/ \
            --title "$TITLE" --base-url "$BASE_URL"
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-checkout
      - name: Copy plots to gh-pages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DEST="gh-pages-checkout/plots/pr/${{ github.event.pull_request.number }}/${{ github.run_id }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            DEST="gh-pages-checkout/plots/master/${{ github.run_id }}-$SHORT_SHA"
          fi
          mkdir -p "$DEST"
          cp -r all-plots/* "$DEST/"
      - name: Push to gh-pages
        run: |
          cd gh-pages-checkout
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plots/
          git diff --staged --quiet && echo "No plot changes" && exit 0
          git commit -m "Add CI plots for ${{ github.sha }}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin gh-pages && git push origin gh-pages && break
            echo "Push failed (attempt $attempt), retrying..."
            sleep $((attempt * 5))
          done
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-plots-comment -->';
            const body = fs.readFileSync('all-plots/comment.md', 'utf8');

            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, run-sim-chain, run-fixed-target, run-tracking-benchmark]
    steps:
      - name: Check status of all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
