name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - v*
  workflow_dispatch:
  merge_group:
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo 'matrix={"version":["26.02","26.03","26.04"],"vessel_option":["vacuums","helium"],"SND_option":["all"],"muon_shield":["TRY_2025"],"target":["Jun25"]}' >> "$GITHUB_OUTPUT"
  build:
    runs-on: self-hosted
    needs: generate-matrix
    strategy:
      matrix:
        version: ${{ fromJson(needs.generate-matrix.outputs.matrix).version }}
    container:
      image: registry.cern.ch/ship/gha-runner:latest
      volumes:
        - /cvmfs/ship.cern.ch:/cvmfs/ship.cern.ch
    env:
      version: ${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: FairShip
          lfs: true
      - name: Build
        run: |
          set -o pipefail
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          aliBuild build FairShip --always-prefer-system --config-dir $SHIPDIST --defaults release --jobs $(nproc) --debug 2>&1 | tee build.log | python3 FairShip/.github/scripts/annotate_build.py
      - name: Run tests
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          cd sw/BUILD/FairShip-latest/FairShip
          ctest --output-on-failure
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact-${{ matrix.version }}
          path: sw/
  run-sim-chain:
    runs-on: self-hosted
    needs: [generate-matrix, build]
    container:
      image: registry.cern.ch/ship/gha-runner:latest
      volumes:
        - /cvmfs/ship.cern.ch:/cvmfs/ship.cern.ch
    env:
      version: ${{ matrix.version }}
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: FairShip
          lfs: true
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact-${{ matrix.version }}
          path: sw/
      - name: Run Sim
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/macro/run_simScript.py --test --debug 2 --${{ matrix.vessel_option }} --SND --SND_design=${{ matrix.SND_option }} --shieldName ${{ matrix.muon_shield }} --EvtGenDecayer --tag ci-test
      - name: Overlap check
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/python/experimental/check_overlaps.py --geofile geo_ci-test.root | tee log
          ! grep "Overlap" log
      - name: Geo information
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/macro/getGeoInformation.py --geometry geo_ci-test.root --level 2
      - name: Run Reco
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/macro/ShipReco.py -f sim_ci-test.root -g geo_ci-test.root --patRec AR --Debug
      - name: Run Ana
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/macro/ShipAna.py -f sim_ci-test.root -r sim_ci-test_rec.root -g geo_ci-test.root
      - name: Run examples
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/examples/analysis_example.py -f sim_ci-test.root -r sim_ci-test_rec.root -g geo_ci-test.root
      - name: Render plots
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python FairShip/.github/scripts/render_plots.py \
            recohists.root \
            sim_ci-test_ana.root \
            --output-dir plots/sim-chain/${{ matrix.version }}-${{ matrix.vessel_option }}-${{ matrix.SND_option }}-${{ matrix.muon_shield }} \
            --job sim-chain --config "${{ matrix.version }}-${{ matrix.vessel_option }}-${{ matrix.SND_option }}-${{ matrix.muon_shield }}"
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-sim-chain-${{ matrix.version }}-${{ matrix.vessel_option }}-${{ matrix.SND_option }}-${{ matrix.muon_shield }}
          path: plots/
