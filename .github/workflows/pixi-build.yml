name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
  merge_group:
concurrency:
  group: pixi-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: build-${{ runner.os }}
      - name: Configure
        # CMake initialises CMAKE_CXX_COMPILER_LAUNCHER from this environment
        # variable, so compiles are routed through ccache (installed above).
        run: pixi run --locked configure
        env:
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
      - name: Build
        run: pixi run --locked build
      - name: Test
        run: pixi run --locked test
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/
          retention-days: 1
  run-sim-chain:
    name: Simulation chain (${{ matrix.vessel }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vessel: [vacuums, helium]
        snd_design: [all]
        muon_shield: [TRY_2026]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Simulation
        run: pixi run --locked ci-sim ${{ matrix.vessel }} ${{ matrix.snd_design }} ${{ matrix.muon_shield }}
      - name: Overlap check
        run: pixi run --locked ci-overlap-check
      - name: Geometry info
        run: pixi run --locked ci-geo-info
      - name: Reconstruction
        run: pixi run --locked ci-reco
      - name: Analysis
        run: pixi run --locked ci-ana
      - name: Analysis example
        run: pixi run --locked ci-analysis-example
      - name: Extract metrics
        run: pixi run --locked ci-extract-metrics ${{ matrix.vessel }}-${{ matrix.snd_design }}-${{ matrix.muon_shield }}
      - name: Render plots
        run: pixi run --locked ci-render-plots-sim-chain ${{ matrix.vessel }}-${{ matrix.snd_design }}-${{ matrix.muon_shield }}
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-sim-chain-${{ matrix.vessel }}-${{ matrix.snd_design }}-${{ matrix.muon_shield }}
          path: plots/
      - name: Upload metrics
        uses: actions/upload-artifact@v7
        with:
          name: metrics-${{ matrix.vessel }}-${{ matrix.snd_design }}-${{ matrix.muon_shield }}
          path: metrics-*.json
  run-tracking-benchmark:
    name: Tracking benchmark
    needs: build
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Tracking benchmark
        run: pixi run --locked ci-tracking-benchmark
      - name: Render plots
        run: pixi run --locked ci-render-plots-tracking-benchmark
      - name: Upload tracking metrics
        uses: actions/upload-artifact@v7
        with:
          name: tracking-metrics
          path: |
            tracking_metrics.json
            tracking_benchmark_histos.root
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-tracking-benchmark
          path: plots/
  run-fixed-target:
    name: Fixed-target simulation
    needs: build
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Fixed target
        run: pixi run --locked ci-fixed-target
      - name: Render plots
        run: pixi run --locked ci-render-plots-fixed-target
      - name: Upload .root artifacts
        uses: actions/upload-artifact@v7
        with:
          name: root-files-fixed-target
          path: '*_run_fixedTarget_1/*.root'
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-fixed-target
          path: plots/
  run-muonback:
    name: Muon-background smoke test
    needs: build
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Muon-background smoke test
        run: pixi run --locked ci-sim-muonback
      - name: Upload .root artifacts
        uses: actions/upload-artifact@v7
        with:
          name: root-files-muonback
          path: sim_ci-muonback.root
  static-analysis:
    name: Static analysis (PR diff)
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Find changed files
        id: files
        run: |
          CHANGED=$(git diff --name-only --diff-filter=d ${{ github.event.pull_request.base.sha }} HEAD)
          CPP_FILES=$(echo "$CHANGED" | { grep -E '\.(cxx|h|cpp|cc|hxx|hpp)$' || true; } | tr '\n' ' ')
          PY_FILES=$(echo "$CHANGED" | { grep -E '\.py$' || true; } | tr '\n' ' ')
          echo "cpp=$CPP_FILES" >> "$GITHUB_OUTPUT"
          echo "py=$PY_FILES" >> "$GITHUB_OUTPUT"
      - name: clang-tidy
        if: steps.files.outputs.cpp != ''
        env:
          CPP_FILES: ${{ steps.files.outputs.cpp }}
        run: pixi run --locked ci-clang-tidy
      - name: pyrefly
        if: steps.files.outputs.py != ''
        env:
          PY_FILES: ${{ steps.files.outputs.py }}
        run: pixi run --locked ci-pyrefly
  static-analysis-push:
    name: Static analysis (full)
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Find C++ files
        id: files
        run: |
          CPP_FILES=$(find . \
            -path ./.git -prune -o \
            -path ./.pixi -prune -o \
            -path ./.direnv -prune -o \
            -path ./.github -prune -o \
            -path ./build -prune -o \
            -path ./cmake -prune -o \
            -type f \( -name '*.cxx' -o -name '*.h' -o -name '*.cpp' -o -name '*.cc' -o -name '*.hxx' -o -name '*.hpp' \) -print | tr '\n' ' ')
          echo "cpp=$CPP_FILES" >> "$GITHUB_OUTPUT"
      - name: clang-tidy
        if: steps.files.outputs.cpp != ''
        continue-on-error: true
        env:
          CPP_FILES: ${{ steps.files.outputs.cpp }}
        run: pixi run --locked ci-clang-tidy
      - name: pyrefly
        continue-on-error: true
        run: pixi run --locked -- pyrefly check --output-format=github python macro
  store-metrics:
    name: Store metrics reference
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: run-sim-chain
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: metrics-*
          path: metrics/
          merge-multiple: true
      - name: Store metrics in git notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in metrics/metrics-*.json; do
            config=$(basename "$f" .json)
            config=${config#metrics-}
            ref="refs/notes/ci/physics-metrics/$config"
            stored=false
            for attempt in 1 2 3 4 5; do
              git fetch origin "+$ref:$ref" || true
              git notes --ref="$ref" add -f -F "$f" "$GITHUB_SHA"
              if git push origin "$ref"; then
                stored=true
                break
              fi
              echo "Push failed (attempt $attempt), retrying..."
              sleep $((attempt * 5))
            done
            if ! $stored; then
              echo "::error::Failed to store metrics for $config after 5 attempts"
              exit 1
            fi
          done
  compare-metrics:
    name: Compare physics metrics
    if: github.event_name == 'pull_request'
    needs: run-sim-chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          pattern: metrics-*
          path: metrics/
          merge-multiple: true
      - name: Fetch metrics references
        run: git fetch origin '+refs/notes/ci/physics-metrics/*:refs/notes/ci/physics-metrics/*' || true
      - name: Compare against reference
        run: |
          mkdir -p comparisons
          for f in metrics/metrics-*.json; do
            config=$(basename "$f" .json)
            config=${config#metrics-}
            ref="ci/physics-metrics/$config"
            # The tip of master may not have a note yet (its CI run might
            # still be going), so walk back to the newest commit that has one.
            reference=""
            for commit in $(git rev-list --first-parent -n 50 origin/master); do
              if git notes --ref="$ref" show "$commit" > "reference-$config.json" 2>/dev/null; then
                reference="$commit"
                break
              fi
            done
            {
              echo "Configuration: $config"
              if [ -n "$reference" ]; then
                echo "Reference commit: $reference"
                pixi run --locked ci-compare-metrics "reference-$config.json" "$f"
              else
                echo "No reference metrics found for $config"
              fi
            } | tee "comparisons/comparison_$config.txt"
          done
      - name: Generate summary
        run: |
          pixi run --locked -- ship-metrics-pr-comment comparisons/ -o comment-body.md
          {
            echo '<!-- physics-metrics-comment -->'
            cat comment-body.md
          } > comment.md
          cat comment.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post PR comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- physics-metrics-comment -->';
            const body = fs.readFileSync('comment.md', 'utf8');
            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
  deploy-plots:
    name: Deploy plots
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [run-tracking-benchmark, run-sim-chain, run-fixed-target]
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download all plot artefacts
        uses: actions/download-artifact@v8
        with:
          pattern: plots-*
          path: all-plots/
          merge-multiple: true
      - name: Generate index page
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TITLE="CI Plots for PR #${{ github.event.pull_request.number }}"
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plots/pr/${{ github.event.pull_request.number }}/${{ github.run_id }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            TITLE="CI Plots for $SHORT_SHA"
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plots/master/${{ github.run_id }}-$SHORT_SHA"
          fi
          python3 .github/scripts/generate_plot_index.py all-plots/ \
            --title "$TITLE" --base-url "$BASE_URL"
      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages-checkout
      - name: Copy plots to gh-pages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DEST="gh-pages-checkout/plots/pr/${{ github.event.pull_request.number }}/${{ github.run_id }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            DEST="gh-pages-checkout/plots/master/${{ github.run_id }}-$SHORT_SHA"
          fi
          mkdir -p "$DEST"
          cp -r all-plots/* "$DEST/"
      - name: Push to gh-pages
        run: |
          cd gh-pages-checkout
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plots/
          git diff --staged --quiet && echo "No plot changes" && exit 0
          git commit -m "Add CI plots for ${{ github.sha }}"
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin gh-pages && git push origin gh-pages; then
              pushed=true
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            sleep $((attempt * 5))
          done
          if ! $pushed; then
            echo "::error::Failed to push plots to gh-pages after 5 attempts"
            exit 1
          fi
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-plots-comment -->';
            const body = fs.readFileSync('all-plots/comment.md', 'utf8');
            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
  all-checks:
    name: All checks passed
    if: always()
    runs-on: ubuntu-latest
    needs: [build, run-sim-chain, run-fixed-target, run-tracking-benchmark, run-muonback]
    steps:
      - name: Check status of all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
