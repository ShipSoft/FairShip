name: Pixi Build
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
  merge_group:
concurrency:
  group: pixi-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo 'matrix={"vessel":["vacuums","helium"],"snd_design":["all"],"muon_shield":["TRY_2025"]}' >> "$GITHUB_OUTPUT"
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
      - name: Configure
        run: pixi run --locked configure
      - name: Build
        run: pixi run --locked build
      - name: Test
        run: pixi run --locked test
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/
          retention-days: 1
  run-sim-chain:
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Sim
        run: pixi run --locked ci-sim ${{ matrix.vessel }} ${{ matrix.snd_design }} ${{ matrix.muon_shield }}
      - name: Overlap check
        run: pixi run --locked ci-overlap-check
      - name: Geo info
        run: pixi run --locked ci-geo-info
      - name: Reco
        run: pixi run --locked ci-reco
      - name: Ana
        run: pixi run --locked ci-ana
      - name: Analysis example
        run: pixi run --locked ci-analysis-example
      - name: Render plots
        run: pixi run --locked ci-render-plots-sim-chain ${{ matrix.vessel }}-${{ matrix.snd_design }}-${{ matrix.muon_shield }}
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-sim-chain-${{ matrix.vessel }}-${{ matrix.snd_design }}-${{ matrix.muon_shield }}
          path: plots/
  run-tracking-benchmark:
    needs: build
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Tracking benchmark
        run: pixi run --locked ci-tracking-benchmark
      - name: Render plots
        run: pixi run --locked ci-render-plots-tracking-benchmark
      - name: Upload tracking metrics
        uses: actions/upload-artifact@v7
        with:
          name: tracking-metrics
          path: |
            tracking_metrics.json
            tracking_benchmark_histos.root
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-tracking-benchmark
          path: plots/
  run-fixed-target:
    needs: build
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Fixed target
        run: pixi run --locked ci-fixed-target
      - name: Render plots
        run: pixi run --locked ci-render-plots-fixed-target
      - name: Upload .root artifacts
        uses: actions/upload-artifact@v7
        with:
          name: root-files-fixed-target
          path: '*_run_fixedTarget_1/*.root'
      - name: Upload plot images
        uses: actions/upload-artifact@v7
        with:
          name: plots-fixed-target
          path: plots/
  static-analysis:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Find changed files
        id: files
        run: |
          CHANGED=$(git diff --name-only --diff-filter=d ${{ github.event.pull_request.base.sha }} HEAD)
          CPP_FILES=$(echo "$CHANGED" | { grep -E '\.(cxx|h|cpp|cc|hxx|hpp)$' || true; } | tr '\n' ' ')
          PY_FILES=$(echo "$CHANGED" | { grep -E '\.py$' || true; } | tr '\n' ' ')
          echo "cpp=$CPP_FILES" >> "$GITHUB_OUTPUT"
          echo "py=$PY_FILES" >> "$GITHUB_OUTPUT"
      - name: clang-tidy
        if: steps.files.outputs.cpp != ''
        env:
          CPP_FILES: ${{ steps.files.outputs.cpp }}
        run: pixi run --locked ci-clang-tidy
      - name: pyrefly
        if: steps.files.outputs.py != ''
        env:
          PY_FILES: ${{ steps.files.outputs.py }}
        run: pixi run --locked ci-pyrefly
  static-analysis-push:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: build/
      - name: Find C++ files
        id: files
        run: |
          CPP_FILES=$(find . -not -path './cmake/*' -not -path './build/*' \
            \( -name '*.cxx' -o -name '*.h' -o -name '*.cpp' -o -name '*.cc' -o -name '*.hxx' -o -name '*.hpp' \) | tr '\n' ' ')
          echo "cpp=$CPP_FILES" >> "$GITHUB_OUTPUT"
      - name: clang-tidy
        if: steps.files.outputs.cpp != ''
        continue-on-error: true
        env:
          CPP_FILES: ${{ steps.files.outputs.cpp }}
        run: pixi run --locked ci-clang-tidy
      - name: pyrefly
        continue-on-error: true
        run: pixi run --locked -- pyrefly check --output-format=github
  deploy-plots:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [run-tracking-benchmark, run-sim-chain, run-fixed-target]
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download all plot artefacts
        uses: actions/download-artifact@v8
        with:
          pattern: plots-*
          path: all-plots/
          merge-multiple: true
      - name: Generate index page
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TITLE="CI Plots for PR #${{ github.event.pull_request.number }}"
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plots/pr/${{ github.event.pull_request.number }}/${{ github.run_id }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            TITLE="CI Plots for $SHORT_SHA"
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plots/master/${{ github.run_id }}-$SHORT_SHA"
          fi
          python3 .github/scripts/generate_plot_index.py all-plots/ \
            --title "$TITLE" --base-url "$BASE_URL"
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-checkout
      - name: Copy plots to gh-pages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DEST="gh-pages-checkout/plots/pr/${{ github.event.pull_request.number }}/${{ github.run_id }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            DEST="gh-pages-checkout/plots/master/${{ github.run_id }}-$SHORT_SHA"
          fi
          mkdir -p "$DEST"
          cp -r all-plots/* "$DEST/"
      - name: Push to gh-pages
        run: |
          cd gh-pages-checkout
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plots/
          git diff --staged --quiet && echo "No plot changes" && exit 0
          git commit -m "Add CI plots for ${{ github.sha }}"
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin gh-pages && git push origin gh-pages; then
              pushed=true
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            sleep $((attempt * 5))
          done
          if ! $pushed; then
            echo "::error::Failed to push plots to gh-pages after 5 attempts"
            exit 1
          fi
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-plots-comment -->';
            const body = fs.readFileSync('all-plots/comment.md', 'utf8');
            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, run-sim-chain, run-fixed-target, run-tracking-benchmark]
    steps:
      - name: Check status of all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
