name: Lint
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
  merge_group:
concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  prek:
    name: Pre-commit (prek)
    permissions:
      contents: read
      pull-requests: write # let prek post its output as a PR comment on failure
    uses: ShipSoft/.github/.github/workflows/prek.yml@main
    with:
      # mypy was skipped on pre-commit.ci; keep it local-only for now.
      extra-args: --skip mypy
  commit-check:
    name: Commit messages (commitizen)
    permissions:
      contents: read
      pull-requests: write # let commit-check post its output as a PR comment on failure
    uses: ShipSoft/.github/.github/workflows/commit-check.yml@main
