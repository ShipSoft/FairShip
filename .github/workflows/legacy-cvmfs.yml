name: Legacy CVMFS CI
on:
  push:
    branches: [main]
    # Releases use unprefixed CalVer tags (e.g. 26.06, 26.05.1), not v-prefixed
    # (matches the container-build workflow's trigger).
    tags: ['[0-9]*']
  workflow_dispatch:
  schedule:
    - cron: 30 2 * * *
concurrency:
  group: legacy-cvmfs-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build-and-test:
    name: Build & test (${{ matrix.version }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version: ["26.02", "26.06"]
    container:
      image: registry.cern.ch/ship/gha-runner:latest
      volumes:
        - /cvmfs/ship.cern.ch:/cvmfs/ship.cern.ch
    env:
      version: ${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: FairShip
          lfs: true
          fetch-depth: 0
      - name: Build
        run: |
          set -o pipefail
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          aliBuild build FairShip --always-prefer-system --config-dir $SHIPDIST --defaults release --jobs $(nproc) --debug 2>&1 | tee build.log | python3 FairShip/.github/scripts/annotate_build.py
      - name: Run sim
        run: |
          source /cvmfs/ship.cern.ch/$version/setUp.sh
          eval $(alienv load FairShip/latest)
          python $FAIRSHIP/macro/run_simScript.py --test
