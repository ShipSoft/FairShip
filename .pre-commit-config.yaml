# Run with prek (https://github.com/j178/prek), a drop-in pre-commit replacement.
# The hook tools are provided by the pixi `lint` environment (see pixi.toml), so
# versions are tracked in pixi.lock and the hooks run identically everywhere.
#
#   pixi run install-hooks   # one-off: install the git hooks
#   pixi run lint            # run all hooks on all files
repos:
  # prek runs these as native Rust builtins (no environment, fully portable).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.dat$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
  # Tools below come from the pixi `lint` environment via language: system.
  - repo: local
    hooks:
      # check-ast has no prek builtin; entry comes from the pre-commit-hooks
      # package in the lint environment.
      - id: check-ast
        name: check python ast
        language: system
        entry: check-ast
        types: [python]
      - id: ruff-check
        name: ruff check
        language: system
        entry: ruff check --force-exclude
        args: [--fix, --show-fixes]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format --force-exclude
        types_or: [python, pyi, jupyter]
      - id: clang-format
        name: clang-format
        language: system
        entry: clang-format -i
        types_or: [c++, c, cuda]
        exclude: LinkDef.h
      - id: cpplint
        name: cpplint
        language: system
        entry: cpplint
        types: [c++]
        exclude: LinkDef.h
      - id: codespell
        name: codespell
        language: system
        entry: codespell
        types: [text]
        exclude: ^pixi\.lock$
      - id: pyupgrade
        name: pyupgrade
        language: system
        entry: pyupgrade --py313-plus
        types: [python]
      - id: mypy
        name: mypy (type-check)
        language: system
        entry: mypy
        types_or: [python, pyi]
        files: ^(\.github/scripts/annotate_build\.py|python/experimental/check_overlaps\.py|python/experimental/compare_histograms\.py|macro/makeGenieEvents\.py|macro/convertTreeToRNTuple\.py|macro/inspect_tree_branches\.py|python/genie_interface\.py|python/BaseDetector\.py|python/detectors/UpstreamTaggerDetector\.py|python/ShipGeoConfig\.py|python/method_logger\.py|python/decorators\.py|python/pythia8_conf_utils\.py|python/shipRoot_conf\.py|python/shipVeto\.py|python/rootUtils\.py|python/geomGeant4\.py|python/readDecayTable\.py|python/shipDigiReco\.py)$
        args:
          - --python-version=3.13
          - --ignore-missing-imports
          - --show-column-numbers
          - --pretty
          - --follow-imports=skip
          - --disable-error-code=name-defined
      - id: validate-cff
        name: validate CITATION.cff
        language: system
        entry: cffconvert --validate
        files: ^CITATION\.cff$
        pass_filenames: false
      - id: reuse
        name: reuse lint
        language: system
        entry: reuse lint
        pass_filenames: false
        always_run: true
      - id: gersemi
        name: gersemi
        language: system
        entry: gersemi -i
        files: (\.cmake|CMakeLists\.txt)$
      - id: yamlfmt
        name: yamlfmt
        language: system
        entry: yamlfmt
        types: [yaml]
        exclude: python/hnl_production|\.clang-tidy|\.clang-format
      - id: commitizen
        name: commitizen (conventional commits)
        language: system
        entry: cz check --commit-msg-file
        stages: [commit-msg]
