[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = [
    "E402",  # Module import not at top - common in simulation scripts
    "E501",  # Line too long - handled by formatter where possible
    "E722",  # Bare except - common for edge case handling in physics code
]


[tool.codespell]
ignore-words-list = 'Millepede,Gaus,gaus,dYIn,te,KNO,kno'

[tool.pyrefly]
python-version = "3.12"
search-path = ["python"]

replace-imports-with-any = [
    "ROOT", "ROOT.*",
    "rootUtils", "rootUtils.*",
    "genfit", "genfit.*",
    "cppyy", "cppyy.*",
    "ShipGeoConfig", "ShipGeoConfig.*",
    "shipRoot_conf", "shipRoot_conf.*",
]

ignore-missing-imports = [
    "uproot", "uproot.*",
    "scipy", "scipy.*",
    "tabulate",
    "numpy", "numpy.*",
    "yaml", "yaml.*",
]

[tool.pyrefly.errors]
missing-import = false
